[pytest]
# Put the repo root on sys.path so `import agent` resolves when pytest is run
# from any directory (pytest inserts the test file's dir, not the root, by
# default). Shared by every tests/*.py module.
pythonpath = .
testpaths = tests
markers =
    live: exercises the network / live PubMed MCP (deselect with -m "not live")
